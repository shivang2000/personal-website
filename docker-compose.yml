services:
  envoy:
    image: shivang2000/personal-website-envoy:latest
    container_name: envoy
    ports:
      - "80:80"
      - "443:443"
      - "9901:9901"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - acme-server
    restart: unless-stopped

  acme-server:
    image: nginx:alpine
    volumes:
      - certbot-webroot:/usr/share/nginx/html:ro
    expose:
      - "80"
    restart: unless-stopped

  certbot:
    # Custom image: certbot/certbot + docker-cli, so the deploy-hook can
    # restart Envoy after a successful renewal (Envoy does not hot-reload
    # filename-based TLS certs).
    build:
      context: .
      dockerfile: Dockerfile.certbot
    image: shivang2000/personal-website-certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      # Lets the deploy-hook drive the host Docker daemon to restart Envoy.
      # NOTE: root-equivalent host access — acceptable for this single-tenant box.
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook \"docker restart envoy\"; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

  web:
    image: shivang2000/personal-website:latest
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    restart: unless-stopped

volumes:
  letsencrypt:
  certbot-webroot:
