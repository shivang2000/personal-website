name: personal-website

services:
  postgres:
    image: postgres
    container_name: personal-website-postgres
    environment:
      POSTGRES_DB: personal-website
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - personal-website_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  personal-website_postgres_data:
